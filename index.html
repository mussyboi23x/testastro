<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Astro Party - Pilot Mode</title>
<style>
body {
    margin: 0;
    background: #050505;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
canvas {
    background: #0a0a0a;
    image-rendering: pixelated;
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const W = 960;
const H = 540;
canvas.width = W;
canvas.height = H;

const BORDER = 8;

let bullets = [];

function createPlayer(x, y, angle, color, team) {
    return {
        x, y,
        vx: 0,
        vy: 0,
        angle,
        baseSpeed: 3.2,
        rotationSpeed: 0.12,
        color,
        team,

        isTurning: false,
        isActionPressed: false,
        lastAction: false,

        ammo: 3,
        recharge: 0,

        hullBroken: false,
        pilotSpeedFactor: 0.3
    };
}

let player1 = createPlayer(W/2, H/2+100, -Math.PI/2, "#00DDFF", "BLUE");
let player2 = createPlayer(W/2, H/2-100, Math.PI/2, "#FF0000", "RED");

window.addEventListener("keydown", e=>{
    if(e.code==="KeyW") player1.isTurning=true;
    if(e.code==="KeyE") player1.isActionPressed=true;

    if(e.code==="KeyO") player2.isTurning=true;
    if(e.code==="KeyP") player2.isActionPressed=true;
});

window.addEventListener("keyup", e=>{
    if(e.code==="KeyW") player1.isTurning=false;
    if(e.code==="KeyE") player1.isActionPressed=false;

    if(e.code==="KeyO") player2.isTurning=false;
    if(e.code==="KeyP") player2.isActionPressed=false;
});

function breakHull(p){
    p.hullBroken = true;
    p.pilotSpeedFactor = 0.3;
}

function updatePlayer(p){

    if(!p.hullBroken){

        if(p.isTurning) p.angle += p.rotationSpeed;

        // thrust
        p.vx += Math.cos(p.angle) * p.baseSpeed * 0.12;
        p.vy += Math.sin(p.angle) * p.baseSpeed * 0.12;

        p.vx *= 0.985;
        p.vy *= 0.985;

        let sp = Math.hypot(p.vx,p.vy);
        if(sp>p.baseSpeed){
            p.vx = (p.vx/sp)*p.baseSpeed;
            p.vy = (p.vy/sp)*p.baseSpeed;
        }

    } else {

        // PILOT MODE
        if(p.isTurning) p.angle += p.rotationSpeed*0.8;

        let pilotMax = p.baseSpeed * p.pilotSpeedFactor;

        p.vx += Math.cos(p.angle) * pilotMax * 0.08;
        p.vy += Math.sin(p.angle) * pilotMax * 0.08;

        p.vx *= 0.99;
        p.vy *= 0.99;

        let sp = Math.hypot(p.vx,p.vy);

        // Build momentum over time
        if(sp > pilotMax*0.8 && p.pilotSpeedFactor < 0.8){
            p.pilotSpeedFactor += 0.002;
        }

        let cap = p.baseSpeed * p.pilotSpeedFactor;
        if(sp > cap){
            p.vx = (p.vx/sp)*cap;
            p.vy = (p.vy/sp)*cap;
        }
    }

    p.x += p.vx;
    p.y += p.vy;

    p.x = Math.max(BORDER, Math.min(W-BORDER, p.x));
    p.y = Math.max(BORDER, Math.min(H-BORDER, p.y));

    // Shooting
    if(p.isActionPressed && !p.lastAction && p.ammo>0){
        p.ammo--;
        bullets.push({
            x: p.x + Math.cos(p.angle)*8,
            y: p.y + Math.sin(p.angle)*8,
            vx: Math.cos(p.angle)*7,
            vy: Math.sin(p.angle)*7,
            team: p.team,
            life: 240
        });
    }
    p.lastAction = p.isActionPressed;

    // Recharge
    if(p.ammo<3){
        p.recharge++;
        if(p.recharge>=42){
            p.ammo++;
            p.recharge=0;
        }
    }
}

function update(){

    updatePlayer(player1);
    updatePlayer(player2);

    for(let i=bullets.length-1;i>=0;i--){
        let b=bullets[i];
        b.x+=b.vx;
        b.y+=b.vy;
        b.life--;

        [player1,player2].forEach(p=>{
            if(!p.hullBroken && b.team!==p.team){
                let dx=b.x-p.x;
                let dy=b.y-p.y;
                if(Math.hypot(dx,dy)<10){
                    breakHull(p);
                }
            }
        });

        if(b.life<=0||b.x<BORDER||b.x>W-BORDER||b.y<BORDER||b.y>H-BORDER){
            bullets.splice(i,1);
        }
    }
}

function drawPlayer(p){
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.angle);

    if(!p.hullBroken){

        ctx.fillStyle=p.color;
        ctx.beginPath();
        ctx.moveTo(8,0);
        ctx.lineTo(-6,-6);
        ctx.lineTo(-4,0);
        ctx.lineTo(-6,6);
        ctx.fill();

        ctx.fillStyle="#FFF";
        ctx.fillRect(-1.5,-1.5,3,3);

    } else {

        // BODY
        ctx.fillStyle=p.color;
        ctx.beginPath();
        ctx.arc(-2,0,5,0,Math.PI*2);
        ctx.fill();

        // HEAD (white, facing direction)
        ctx.fillStyle="#FFFFFF";
        ctx.beginPath();
        ctx.arc(5,0,4,0,Math.PI*2);
        ctx.fill();
    }

    ctx.restore();
}

function draw(){
    ctx.fillStyle="#0a0a0a";
    ctx.fillRect(0,0,W,H);

    ctx.strokeStyle="#0066FF";
    ctx.lineWidth=BORDER;
    ctx.strokeRect(BORDER/2,BORDER/2,W-BORDER,H-BORDER);

    bullets.forEach(b=>{
        ctx.fillStyle=b.team==="BLUE"?"#00DDFF":"#FF0000";
        ctx.fillRect(b.x-2,b.y-2,4,4);
    });

    drawPlayer(player1);
    drawPlayer(player2);
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
