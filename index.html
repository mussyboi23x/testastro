<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Astro Party Clean 2P</title>
<style>
body { margin:0; background:#050505; display:flex; justify-content:center; align-items:center; height:100vh; }
canvas { background:#0a0a0a; image-rendering:pixelated; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const W = 960, H = 540;
canvas.width = W; canvas.height = H;

const BORDER = 8;
let bullets = [];

function createPlayer(x,y,angle,color,team){
    return {
        x,y,vx:0,vy:0,angle,
        speed:3.2,
        pilotSwimSpeed:0.2,
        rotationSpeed:0.08, // less sensitive
        isTurning:false,
        isAction:false,
        hullActive:true,
        color,team,
        ammo:3,
        recharge:0,
        lastAction:false
    };
}

let p1 = createPlayer(W/2,H/2+120,-Math.PI/2,"#00DDFF","BLUE");
let p2 = createPlayer(W/2,H/2-120,Math.PI/2,"#FF0000","RED");

window.addEventListener("keydown",e=>{
    if(e.code==="KeyW") p1.isTurning=true;
    if(e.code==="KeyE") p1.isAction=true;
    if(e.code==="KeyO") p2.isTurning=true;
    if(e.code==="KeyP") p2.isAction=true;
});

window.addEventListener("keyup",e=>{
    if(e.code==="KeyW") p1.isTurning=false;
    if(e.code==="KeyE") p1.isAction=false;
    if(e.code==="KeyO") p2.isTurning=false;
    if(e.code==="KeyP") p2.isAction=false;
});

function breakHull(p){
    p.hullActive=false;
}

function updatePlayer(p){

    if(p.isTurning) p.angle += p.rotationSpeed;

    // SHOOT ONLY IF HULL ACTIVE
    if(p.hullActive && p.isAction && !p.lastAction && p.ammo>0){
        p.ammo--;
        bullets.push({
            x:p.x + Math.cos(p.angle)*12,
            y:p.y + Math.sin(p.angle)*12,
            vx:Math.cos(p.angle)*5.5,
            vy:Math.sin(p.angle)*5.5,
            team:p.team,
            life:240
        });
    }

    p.lastAction = p.isAction;

    if(p.hullActive){
        p.vx = Math.cos(p.angle)*p.speed;
        p.vy = Math.sin(p.angle)*p.speed;
    } else {
        if(p.isAction){
            p.vx += Math.cos(p.angle)*p.pilotSwimSpeed;
            p.vy += Math.sin(p.angle)*p.pilotSwimSpeed;
        }
        p.vx *= 0.96;
        p.vy *= 0.96;
    }

    p.x += p.vx;
    p.y += p.vy;

    p.x = Math.max(BORDER, Math.min(W-BORDER,p.x));
    p.y = Math.max(BORDER, Math.min(H-BORDER,p.y));

    if(p.ammo<3 && p.hullActive){
        p.recharge++;
        if(p.recharge>=42){
            p.ammo++;
            p.recharge=0;
        }
    }
}

function update(){

    updatePlayer(p1);
    updatePlayer(p2);

    for(let i=bullets.length-1;i>=0;i--){
        let b=bullets[i];
        b.x+=b.vx;
        b.y+=b.vy;
        b.life--;

        [p1,p2].forEach(p=>{
            if(p.hullActive && b.team!==p.team){
                if(Math.hypot(b.x-p.x,b.y-p.y)<14){
                    breakHull(p);
                }
            }
        });

        if(b.life<=0 || b.x<BORDER || b.x>W-BORDER || b.y<BORDER || b.y>H-BORDER){
            bullets.splice(i,1);
        }
    }
}

function drawShip(p){
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.angle);

    ctx.fillStyle=p.color;

    // same shape, just scaled
    ctx.beginPath();
    ctx.moveTo(12,0);
    ctx.lineTo(-9,-8);
    ctx.lineTo(-5,0);
    ctx.lineTo(-9,8);
    ctx.fill();

    ctx.fillStyle="#FFF";
    ctx.fillRect(-2,-2,4,4);

    ctx.restore();
}

function drawPilot(p){
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.angle);

    // small body
    ctx.fillStyle=p.color;
    ctx.fillRect(-3,-3,6,6);

    // same centered white core
    ctx.fillStyle="#FFF";
    ctx.fillRect(-1.5,-1.5,3,3);

    ctx.restore();
}

function draw(){
    ctx.fillStyle="#0a0a0a";
    ctx.fillRect(0,0,W,H);

    ctx.strokeStyle="#0066FF";
    ctx.lineWidth=BORDER;
    ctx.strokeRect(BORDER/2,BORDER/2,W-BORDER,H-BORDER);

    bullets.forEach(b=>{
        ctx.fillStyle=b.team==="BLUE"?"#00DDFF":"#FF0000";
        ctx.fillRect(b.x-1,b.y-1,3,3);
    });

    if(p1.hullActive) drawShip(p1); else drawPilot(p1);
    if(p2.hullActive) drawShip(p2); else drawPilot(p2);
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
