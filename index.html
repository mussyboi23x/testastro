<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Astro Party</title>
    <style>
        body { background: #050505; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { 
            background: #0a0a0a; 
            image-rendering: pixelated; 
            object-fit: contain; 
            width: 100%; 
            height: 100%; 
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Resolution doubled: Ship is now smaller relative to the arena
        const V_WIDTH = 960, V_HEIGHT = 540;
        canvas.width = V_WIDTH; canvas.height = V_HEIGHT;

        let bullets = [];
        let debris = [];
        let shakeTime = 0;

        let player = {
            x: V_WIDTH / 2, y: V_HEIGHT / 2, vx: 0, vy: 0, angle: -Math.PI / 2,
            speed: 3.2, // Slightly faster to compensate for larger arena
            pilotSwimSpeed: 0.2, maxSwimSpeed: 2.2, rotationSpeed: 0.12,
            isTurning: false, isActionPressed: false, hullActive: true,
            color: '#00DDFF', ammo: 3, rechargeTimer: 0, lastActionState: false
        };

        const BORDER_THICKNESS = 8;
        const BORDER_COLOR = '#0066FF';

        window.addEventListener('keydown', (e) => { 
            if(e.code === 'KeyW') player.isTurning = true;
            if(e.code === 'KeyE') player.isActionPressed = true;
            if(e.code === 'KeyK') player.hullActive = false; // Debug
        });
        window.addEventListener('keyup', (e) => { 
            if(e.code === 'KeyW') player.isTurning = false;
            if(e.code === 'KeyE') player.isActionPressed = false;
        });

        function update() {
            if (shakeTime > 0) shakeTime--;

            if (player.isTurning) player.angle += player.rotationSpeed;
            if (player.isActionPressed && !player.lastActionState && player.hullActive && player.ammo > 0) {
                player.ammo--;
                bullets.push({
                    x: player.x + Math.cos(player.angle) * 8, y: player.y + Math.sin(player.angle) * 8,
                    vx: Math.cos(player.angle) * 5.5, vy: Math.sin(player.angle) * 5.5,
                    owner: 'BLUE', life: 240
                });
            }
            player.lastActionState = player.isActionPressed;

            if (player.hullActive) {
                player.vx = Math.cos(player.angle) * player.speed;
                player.vy = Math.sin(player.angle) * player.speed;
            } else {
                if (player.isActionPressed) {
                    player.vx += Math.cos(player.angle) * player.pilotSwimSpeed;
                    player.vy += Math.sin(player.angle) * player.pilotSwimSpeed;
                }
                player.vx *= 0.96; player.vy *= 0.96;
            }
            player.x += player.vx; player.y += player.vy;


            // Example: obstacle course boundaries (could be generated elsewhere)
const courseMinX = BORDER_THICKNESS;
const courseMaxX = V_WIDTH - BORDER_THICKNESS;
const courseMinY = BORDER_THICKNESS;
const courseMaxY = V_HEIGHT - BORDER_THICKNESS;

// Border / obstacle course collision
if (isObstacleCourse) {
    // Check against obstacle course bounds
    if (player.x < courseMinX) {
        player.x = courseMinX;
        if (player.hullActive) { player.hullActive = false; shakeTime = 10; spawnShatter(player.x, player.y, player.color); }
    }
    if (player.x > courseMaxX) {
        player.x = courseMaxX;
        if (player.hullActive) { player.hullActive = false; shakeTime = 10; spawnShatter(player.x, player.y, player.color); }
    }
    if (player.y < courseMinY) {
        player.y = courseMinY;
        if (player.hullActive) { player.hullActive = false; shakeTime = 10; spawnShatter(player.x, player.y, player.color); }
    }
    if (player.y > courseMaxY) {
        player.y = courseMaxY;
        if (player.hullActive) { player.hullActive = false; shakeTime = 10; spawnShatter(player.x, player.y, player.color); }
    }
}
            if (player.x < BORDER_THICKNESS) player.x = BORDER_THICKNESS;
            if (player.x > V_WIDTH - BORDER_THICKNESS) player.x = V_WIDTH - BORDER_THICKNESS;
            if (player.y < BORDER_THICKNESS) player.y = BORDER_THICKNESS;
            if (player.y > V_HEIGHT - BORDER_THICKNESS) player.y = V_HEIGHT - BORDER_THICKNESS;

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx; b.y += b.vy; b.life--;
                if (b.x < BORDER_THICKNESS || b.x > V_WIDTH - BORDER_THICKNESS || 
                    b.y < BORDER_THICKNESS || b.y > V_HEIGHT - BORDER_THICKNESS) {
                    bullets.splice(i, 1); continue;
                }
                if (b.life <= 0) bullets.splice(i, 1);
            }

            if (player.ammo < 3) {
                player.rechargeTimer++;
                if (player.rechargeTimer >= 42) { player.ammo++; player.rechargeTimer = 0; }
            }
        }

        function draw() {
            ctx.save();
            if (shakeTime > 0) ctx.translate((Math.random() - 0.5) * 6, (Math.random() - 0.5) * 6);
            ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT);

            // Border
            ctx.strokeStyle = BORDER_COLOR;
            ctx.lineWidth = BORDER_THICKNESS;
            ctx.strokeRect(BORDER_THICKNESS/2, BORDER_THICKNESS/2, V_WIDTH - BORDER_THICKNESS, V_HEIGHT - BORDER_THICKNESS);

            // Bullets
            bullets.forEach(b => {
                ctx.fillStyle = player.color;
                ctx.fillRect(Math.round(b.x)-1, Math.round(b.y)-1, 3, 3);
                ctx.fillStyle = '#FF8800';
            });

            // Player
            ctx.save();
            ctx.translate(Math.round(player.x), Math.round(player.y));
            ctx.rotate(player.angle);
            if (player.hullActive) {
                ctx.fillStyle = player.color;
                ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(-6,-6); ctx.lineTo(-4,0); ctx.lineTo(-6,6); ctx.fill();
                ctx.fillStyle = '#FF8800';
                for(let i=0; i<player.ammo; i++) ctx.fillRect(-11, -5+(i*4), 2, 2);
            }
ctx.fillStyle = '#FFF'; ctx.fillRect(-1.5, -1.5, 3, 3);
            ctx.restore();
            ctx.restore();
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
